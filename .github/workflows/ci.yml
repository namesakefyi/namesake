name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - ".changeset/**"
      - ".vscode/**"
      - "CHANGELOG.md"
  push:
    branches: [main]

permissions:
  actions: write # zizmor: ignore[excessive-permissions]
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Setup PNPM
        uses: pnpm/action-setup@v6.0.9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync Astro types
        run: pnpm --filter "@namesake/web" --filter "@namesake/docs" exec astro sync

      - name: Typecheck (Astro)
        run: pnpm --filter "@namesake/web" --filter "@namesake/docs" exec astro check

      - name: Typecheck
        run: pnpm --filter "@namesake/pdf-manager" exec tsc --noEmit

      - name: Biome
        run: pnpm biome ci

  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Setup PNPM
        uses: pnpm/action-setup@v6.0.9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --filter @namesake/web test
