name: PDF Monitor

on:
  schedule:
    - cron: "0 0 * * *" # daily
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check-pdf-drift:
    name: Check PDF Drift
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore PDF hash cache
        uses: actions/cache@v4
        with:
          path: .pdfmonitor
          key: pdf-monitor-${{ github.run_id }}
          restore-keys: pdf-monitor-

      - name: Check PDF drift
        id: check
        run: pnpm --filter @namesake/pdf-manager pdf-monitor
        continue-on-error: true

      - name: Open issue for changed PDFs
        if: steps.check.outputs.has_changes == 'true'
        run: |
          existing=$(gh issue list \
            --state open \
            --search "Upstream PDF changes detected in:title" \
            --json number \
            --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body-file "$GITHUB_STEP_SUMMARY"
          else
            gh issue create \
              --title "Upstream PDF changes detected" \
              --body-file "$GITHUB_STEP_SUMMARY" \
              --label automated
          fi
