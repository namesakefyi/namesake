name: Playwright
on:
  push:
    branches: [main]
    paths:
      [
        "src/**/*.ts",
        "src/**/*.spec.ts",
        "src/**/*.astro",
        "astro.config.ts",
        "playwright.config.ts",
        "package.json",
      ]
  pull_request:
    branches: [main]
    paths:
      [
        "src/**/*.ts",
        "src/**/*.spec.ts",
        "src/**/*.astro",
        "astro.config.ts",
        "playwright.config.ts",
        "package.json",
      ]

permissions:
  contents: read

jobs:
  test:
    name: End-to-End
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm i

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium

      - name: Run Playwright tests
        run: pnpm test:e2e

      - name: Upload Playwright results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
