name: O. Rose Broderick
role: Disability Reporting Fellow, STAT News
bio: O. Rose Broderick is the disability in health care reporting fellow at STAT. She previously worked at WNYC’s Radiolab and Scientific American, and her story debunking a bogus theory about transgender kids was nominated for a 2024 GLAAD Media Award. You can find Rose on Bluesky or riding her bike around Brooklyn.
